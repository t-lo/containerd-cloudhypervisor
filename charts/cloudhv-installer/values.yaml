image:
  repository: ghcr.io/devigned/cloudhv-installer
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

nodeSelector:
  workload: cloudhv

tolerations:
  - operator: "Exists"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

runtimeClass:
  enabled: true
  name: cloudhv
  handler: cloudhv
  overhead:
    memory: "50Mi"
    cpu: "10m"
