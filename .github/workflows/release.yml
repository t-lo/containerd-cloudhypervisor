name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloudhv-installer
  CH_VERSION: "v44.0"
  KERNEL_VERSION: "6.12.8"

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            package: containerd-shim-cloudhv
            artifact: containerd-shim-cloudhv-v1
          - target: x86_64-unknown-linux-musl
            package: cloudhv-agent
            artifact: cloudhv-agent
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler musl-tools

      - name: Build release binary
        run: cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-kernel:
    name: Build Guest Kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: guest/kernel/vmlinux
          key: kernel-${{ env.KERNEL_VERSION }}-${{ hashFiles('guest/kernel/configs/microvm.config', 'guest/kernel/build-kernel.sh') }}

      - name: Install kernel build dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y flex bison libelf-dev bc

      - name: Build kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: cd guest/kernel && bash build-kernel.sh ${{ env.KERNEL_VERSION }}

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: guest/kernel/vmlinux

  build-rootfs:
    name: Build Guest Rootfs
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: cloudhv-agent-x86_64-unknown-linux-musl
          path: /tmp/agent

      - name: Build rootfs
        run: |
          chmod +x /tmp/agent/cloudhv-agent
          cd guest/rootfs
          sudo bash build-rootfs.sh /tmp/agent/cloudhv-agent

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: guest/rootfs/rootfs.ext4

  build-installer-image:
    name: Build & Push Installer Image
    runs-on: ubuntu-latest
    needs: [build-binaries, build-kernel, build-rootfs]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Prepare image contents
        run: |
          mkdir -p /tmp/image-root/opt/cloudhv
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-gnu/containerd-shim-cloudhv-v1 \
            /tmp/image-root/opt/cloudhv/
          cp /tmp/artifacts/vmlinux/vmlinux /tmp/image-root/opt/cloudhv/
          cp /tmp/artifacts/rootfs/rootfs.ext4 /tmp/image-root/opt/cloudhv/
          cp example/aks/installer/install.sh /tmp/image-root/opt/cloudhv/
          chmod +x /tmp/image-root/opt/cloudhv/containerd-shim-cloudhv-v1
          chmod +x /tmp/image-root/opt/cloudhv/install.sh
          # Download virtiofsd
          sudo apt-get update && sudo apt-get install -y virtiofsd
          cp /usr/libexec/virtiofsd /tmp/image-root/opt/cloudhv/
          ls -lh /tmp/image-root/opt/cloudhv/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push installer image
        uses: docker/build-push-action@v6
        with:
          context: /tmp/image-root
          file: .github/Dockerfile.installer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-kernel, build-rootfs, build-installer-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Prepare release assets
        run: |
          mkdir -p /tmp/release
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-gnu/containerd-shim-cloudhv-v1 \
            /tmp/release/containerd-shim-cloudhv-v1-linux-amd64
          cp /tmp/artifacts/cloudhv-agent-x86_64-unknown-linux-musl/cloudhv-agent \
            /tmp/release/cloudhv-agent-linux-amd64
          cp /tmp/artifacts/vmlinux/vmlinux /tmp/release/vmlinux
          cp /tmp/artifacts/rootfs/rootfs.ext4 /tmp/release/rootfs.ext4
          chmod +x /tmp/release/containerd-shim-cloudhv-v1-linux-amd64
          chmod +x /tmp/release/cloudhv-agent-linux-amd64
          # Generate checksums
          cd /tmp/release && sha256sum * > checksums-sha256.txt

      - name: Package and push Helm chart to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" charts/cloudhv-installer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/cloudhv-installer/Chart.yaml

          # Package the chart
          helm package charts/cloudhv-installer --destination /tmp/release

          # Push to GHCR as an OCI artifact
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm push /tmp/release/cloudhv-installer-$VERSION.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            RANGE="$PREV_TAG..HEAD"
            echo "First release — showing all changes." > /tmp/release-notes.md
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "## Changes since ${PREV_TAG}" > /tmp/release-notes.md
          fi
          echo "" >> /tmp/release-notes.md

          # Group commits by type
          for prefix in "feat" "fix" "perf" "docs" "chore" "test" "build"; do
            COMMITS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^${prefix}" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              case $prefix in
                feat)  LABEL="Features" ;;
                fix)   LABEL="Bug Fixes" ;;
                perf)  LABEL="Performance" ;;
                docs)  LABEL="Documentation" ;;
                chore) LABEL="Maintenance" ;;
                test)  LABEL="Tests" ;;
                build) LABEL="Build" ;;
              esac
              echo "### ${LABEL}" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
              echo "$COMMITS" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
            fi
          done

          # Installation section
          cat >> /tmp/release-notes.md << 'INSTALL'
          ## Installation

          ### Binaries (bare Linux)

          Download the binaries from this release and install manually:

          ```bash
          sudo install -m 755 containerd-shim-cloudhv-v1-linux-amd64 /usr/local/bin/containerd-shim-cloudhv-v1
          sudo mkdir -p /opt/cloudhv
          sudo cp vmlinux rootfs.ext4 /opt/cloudhv/
          ```

          ### Helm Chart (Kubernetes)

          The chart is published to GHCR as an OCI artifact:

          ```bash
          helm install cloudhv-installer \
            oci://ghcr.io/devigned/charts/cloudhv-installer \
            --version TAG \
            --namespace kube-system
          ```

          ### Installer Image

          ```
          ghcr.io/devigned/cloudhv-installer:TAG
          ```
          INSTALL

          # Replace TAG placeholder
          sed -i "s/TAG/${GITHUB_REF_NAME}/" /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: /tmp/release/*
          generate_release_notes: false
