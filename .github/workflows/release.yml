name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloudhv-installer
  CH_VERSION: "v44.0"
  KERNEL_SERIES: "6.18"

jobs:
  build-everything:
    name: Build Guest and Host Binaries, Guest root, and sysext for (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Build complete Guest (kernel, agent, and root FS)
        run: |
          bash hacks/build-guest.sh

      - name: Build Containerd shim
        run: |
          bash hacks/build-static-rust.sh containerd-shim-cloudhv

      - name: Build extension image
        run: |
          bash hacks/build-sysext.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            cloudhv-agent
            rootfs.erofs
            vmlinux
            vmlinux.kconfig
            containerd-shim-cloudhv-v1
            containerd-cloudhypervisor.raw

  build-installer-image:
    name: Build Installer Image
    runs-on: ubuntu-latest
    needs: [build-everything]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts (arm64)
        uses: actions/download-artifact@v4
        with:
          name: build-aarch64
          path: /tmp/artifacts/arm64

      - name: Download build artifacts (amd64)
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64
          path: /tmp/artifacts/amd64

      - name: Prepare image contents (amd64)
        run: |
          mkdir -p /tmp/image-root-amd64/opt/cloudhv

          cp /tmp/artifacts/amd64/containerd-shim-cloudhv-v1 \
              /tmp/artifacts/amd64/vmlinux \
              /tmp/artifacts/amd64/rootfs.erofs \
              installer/install.sh \
            /tmp/image-root-amd64/opt/cloudhv/

          chmod +x /tmp/image-root-amd64/opt/cloudhv/containerd-shim-cloudhv-v1
          chmod +x /tmp/image-root-amd64/opt/cloudhv/install.sh
          ls -lh /tmp/image-root-amd64/opt/cloudhv/

      - name: Prepare image contents (arm64)
        run: |
          mkdir -p /tmp/image-root-arm64/opt/cloudhv
          cp /tmp/artifacts/arm64/containerd-shim-cloudhv-v1 \
              /tmp/artifacts/arm64/vmlinux \
              /tmp/artifacts/arm64/rootfs.erofs \
              installer/install.sh \
            /tmp/image-root-arm64/opt/cloudhv/

          chmod +x /tmp/image-root-arm64/opt/cloudhv/containerd-shim-cloudhv-v1
          chmod +x /tmp/image-root-arm64/opt/cloudhv/install.sh
          ls -lh /tmp/image-root-arm64/opt/cloudhv/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push installer image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/image-root-amd64
          file: installer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Build and push installer image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/image-root-arm64
          file: installer/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-everything,build-installer-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts (arm64)
        uses: actions/download-artifact@v4
        with:
          name: build-aarch64
          path: /tmp/artifacts/arm64

      - name: Download build artifacts (amd64)
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64
          path: /tmp/artifacts/amd64

      - name: Prepare release assets
        run: |
          mkdir -p /tmp/release

          # x86_64
          cd /tmp/artifacts/amd64
          cp -v cloudhv-agent /tmp/release/cloudhv-agent-linux-amd64 
          cp -v containerd-shim-cloudhv-v1 /tmp/release/containerd-shim-cloudhv-v1-linux-amd64 
          cp -v rootfs.erofs /tmp/release/rootfs-amd64.erofs 
          cp -v vmlinux /tmp/release/vmlinux-amd64
          cp -v vmlinux.kconfig /tmp/release/vmlinux-amd64.kconfig
          cp -v containerd-cloudhypervisor.raw /tmp/release/containerd-cloudhypervisor-${{ github.ref_name }}-x86-64.raw

          chmod +x /tmp/release/containerd-shim-cloudhv-v1-linux-amd64
          chmod +x /tmp/release/cloudhv-agent-linux-amd64

          # aarch64
          cd /tmp/artifacts/arm64
          cp -v cloudhv-agent /tmp/release/cloudhv-agent-linux-arm64 
          cp -v containerd-shim-cloudhv-v1 /tmp/release/containerd-shim-cloudhv-v1-linux-arm64 
          cp -v rootfs.erofs /tmp/release/rootfs-arm64.erofs 
          cp -v vmlinux /tmp/release/vmlinux-arm64
          cp -v vmlinux.kconfig /tmp/release/vmlinux-arm64.kconfig
          cp -v containerd-cloudhypervisor.raw /tmp/release/containerd-cloudhypervisor-${{ github.ref_name }}-arm64.raw

          chmod +x /tmp/release/containerd-shim-cloudhv-v1-linux-arm64
          chmod +x /tmp/release/cloudhv-agent-linux-arm64

          # Generate checksums
          cd /tmp/release && sha256sum * > checksums-sha256.txt

      - name: Package and push Helm chart to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" charts/cloudhv-installer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/cloudhv-installer/Chart.yaml

          # Package the chart
          helm package charts/cloudhv-installer --destination /tmp/release

          # Push to GHCR as an OCI artifact
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm push /tmp/release/cloudhv-installer-$VERSION.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            RANGE="$PREV_TAG..HEAD"
            echo "First release — showing all changes." > /tmp/release-notes.md
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "## Changes since ${PREV_TAG}" > /tmp/release-notes.md
          fi
          echo "" >> /tmp/release-notes.md

          # Group commits by type
          for prefix in "feat" "fix" "perf" "docs" "chore" "test" "build"; do
            COMMITS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^${prefix}" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              case $prefix in
                feat)  LABEL="Features" ;;
                fix)   LABEL="Bug Fixes" ;;
                perf)  LABEL="Performance" ;;
                docs)  LABEL="Documentation" ;;
                chore) LABEL="Maintenance" ;;
                test)  LABEL="Tests" ;;
                build) LABEL="Build" ;;
              esac
              echo "### ${LABEL}" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
              echo "$COMMITS" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
            fi
          done

          # Installation section
          cat >> /tmp/release-notes.md << 'INSTALL'
          ## Installation

          ### System extension image

          Download `containerd-cloudhypervisor-TAG-x86-64.raw` to `/etc/extensions/containerd-cloudhypervisor.raw`,
          then run `systemd-sysext refresh`.

          Use the following Butane config to automatically install the sysext at provisioning time on distros that support Ignition / Butane provisioning (Fedora CoreOS, SUSE MicroOS, Flatcar, etc.).
          Adjust `variant:` and `version:` in accordance with your distro's requirements.
          The example is for `x86-64`; replace with `arm64` in the sysext file name to provision for `arm64`.
          ```yaml
          variant: flatcar
          version: 1.0.0

          storage:
            files:
            - path: /etc/extensions/containerd-cloudhypervisor.raw
              mode: 0644
              contents:
                source: https://github.com/devigned/containerd-cloudhypervisor/releases/download/TAG/containerd-cloudhypervisor-TAG-x86-64.raw
          ```
          ### Helm Chart (Kubernetes)

          The chart is published to GHCR as an OCI artifact:

          ```bash
          helm install cloudhv-installer \
            oci://ghcr.io/devigned/charts/cloudhv-installer \
            --version TAG \
            --namespace kube-system
          ```

          ### Installer Image

          ```
          ghcr.io/devigned/cloudhv-installer:TAG
          ```

          ### Manual Binaries (bare Linux)

          Download the binaries from this release and install manually:

          ```bash
          sudo install -m 755 containerd-shim-cloudhv-v1-linux-amd64 /usr/local/bin/containerd-shim-cloudhv-v1
          sudo mkdir -p /opt/cloudhv
          sudo cp vmlinux rootfs.erofs /opt/cloudhv/
          ```
          INSTALL

          # Replace TAG placeholder
          sed -i "s/TAG/${GITHUB_REF_NAME}/g" /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: /tmp/release/*
          generate_release_notes: false
