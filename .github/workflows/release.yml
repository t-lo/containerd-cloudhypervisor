name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cloudhv-installer
  CH_VERSION: "v44.0"
  KERNEL_VERSION: "6.18.16"

jobs:
  build-binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            package: containerd-shim-cloudhv
            artifact: containerd-shim-cloudhv-v1
            runner: ubuntu-latest
            arch: x86_64
          - target: x86_64-unknown-linux-musl
            package: cloudhv-agent
            artifact: cloudhv-agent
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            package: containerd-shim-cloudhv
            artifact: containerd-shim-cloudhv-v1
            runner: ubuntu-24.04-arm
            arch: aarch64
          - target: aarch64-unknown-linux-musl
            package: cloudhv-agent
            artifact: cloudhv-agent
            runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler musl-tools

      - name: Build release binary
        run: |
          if [ "${{ matrix.package }}" = "cloudhv-agent" ]; then
            cd crates/agent && cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}
          fi

      - name: Stage binary for upload
        run: |
          if [ "${{ matrix.package }}" = "cloudhv-agent" ]; then
            cp crates/agent/target/${{ matrix.target }}/release/${{ matrix.artifact }} /tmp/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact }} /tmp/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.target }}
          path: /tmp/${{ matrix.artifact }}

  build-kernel:
    name: Build Guest Kernel (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            config: guest/kernel/configs/microvm.config
            artifact_name: vmlinux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            config: guest/kernel/configs/microvm-aarch64.config
            artifact_name: vmlinux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Cache kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: guest/kernel/vmlinux
          key: kernel-${{ matrix.arch }}-${{ env.KERNEL_VERSION }}-${{ hashFiles(matrix.config, 'guest/kernel/build-kernel.sh') }}

      - name: Install kernel build dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y flex bison libelf-dev bc

      - name: Build kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: cd guest/kernel && bash build-kernel.sh ${{ env.KERNEL_VERSION }}

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: guest/kernel/vmlinux

  build-rootfs:
    name: Build Guest Rootfs (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [build-binaries]
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            agent_artifact: cloudhv-agent-x86_64-unknown-linux-musl
            rootfs_artifact: rootfs-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            agent_artifact: cloudhv-agent-aarch64-unknown-linux-musl
            rootfs_artifact: rootfs-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.agent_artifact }}
          path: /tmp/agent

      - name: Build rootfs
        run: |
          sudo apt-get update && sudo apt-get install -y erofs-utils
          chmod +x /tmp/agent/cloudhv-agent
          cd guest/rootfs
          sudo bash build-rootfs.sh /tmp/agent/cloudhv-agent

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rootfs_artifact }}
          path: guest/rootfs/rootfs.erofs

  build-sysext:
    # FIXME: the below will-rebuild everything instead of re-using the above build artifacts.
    #        We should eventually simplify the above build in the same way as ci.yaml, and build + upload everything in one job.
    name: System Extension Image for (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            sysext_arch: x86-64
            runner: ubuntu-latest
          - arch: aarch64
            sysext_arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build extension image
        run: |
          hacks/build-sysext.sh
          mv containerd-cloudhypervisor.raw containerd-cloudhypervisor-${{ github.ref_name }}-${{ matrix.sysext_arch }}.raw

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: containerd-cloudhypervisor-${{ github.ref_name }}-${{ matrix.sysext_arch }}.raw
          path: containerd-cloudhypervisor-${{ github.ref_name }}-${{ matrix.sysext_arch }}.raw

  build-installer-image:
    name: Build Installer Image
    runs-on: ubuntu-latest
    needs: [build-binaries, build-kernel, build-rootfs]
    steps:
      - uses: actions/checkout@v4

      - name: Download shim (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl
          path: /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl

      - name: Download shim (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl
          path: /tmp/artifacts/containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl

      - name: Download kernel (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: vmlinux-x86_64
          path: /tmp/artifacts/vmlinux-x86_64

      - name: Download kernel (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: vmlinux-aarch64
          path: /tmp/artifacts/vmlinux-aarch64

      - name: Download rootfs (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: rootfs-x86_64
          path: /tmp/artifacts/rootfs-x86_64

      - name: Download rootfs (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: rootfs-aarch64
          path: /tmp/artifacts/rootfs-aarch64

      - name: Prepare image contents (amd64)
        run: |
          mkdir -p /tmp/image-root-amd64/opt/cloudhv
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl/containerd-shim-cloudhv-v1 \
            /tmp/image-root-amd64/opt/cloudhv/
          cp /tmp/artifacts/vmlinux-x86_64/vmlinux /tmp/image-root-amd64/opt/cloudhv/
          cp /tmp/artifacts/rootfs-x86_64/rootfs.erofs /tmp/image-root-amd64/opt/cloudhv/
          cp installer/install.sh /tmp/image-root-amd64/opt/cloudhv/
          chmod +x /tmp/image-root-amd64/opt/cloudhv/containerd-shim-cloudhv-v1
          chmod +x /tmp/image-root-amd64/opt/cloudhv/install.sh
          ls -lh /tmp/image-root-amd64/opt/cloudhv/

      - name: Prepare image contents (arm64)
        run: |
          mkdir -p /tmp/image-root-arm64/opt/cloudhv
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl/containerd-shim-cloudhv-v1 \
            /tmp/image-root-arm64/opt/cloudhv/
          cp /tmp/artifacts/vmlinux-aarch64/vmlinux /tmp/image-root-arm64/opt/cloudhv/
          cp /tmp/artifacts/rootfs-aarch64/rootfs.erofs /tmp/image-root-arm64/opt/cloudhv/
          cp installer/install.sh /tmp/image-root-arm64/opt/cloudhv/
          chmod +x /tmp/image-root-arm64/opt/cloudhv/containerd-shim-cloudhv-v1
          chmod +x /tmp/image-root-arm64/opt/cloudhv/install.sh
          ls -lh /tmp/image-root-arm64/opt/cloudhv/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push installer image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/image-root-amd64
          file: installer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Build and push installer image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: /tmp/image-root-arm64
          file: installer/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-kernel, build-rootfs, build-installer-image]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download shim (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl
          path: /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl

      - name: Download shim (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl
          path: /tmp/artifacts/containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl

      - name: Download agent (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhv-agent-x86_64-unknown-linux-musl
          path: /tmp/artifacts/cloudhv-agent-x86_64-unknown-linux-musl

      - name: Download agent (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhv-agent-aarch64-unknown-linux-musl
          path: /tmp/artifacts/cloudhv-agent-aarch64-unknown-linux-musl

      - name: Download kernel (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: vmlinux-x86_64
          path: /tmp/artifacts/vmlinux-x86_64

      - name: Download kernel (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: vmlinux-aarch64
          path: /tmp/artifacts/vmlinux-aarch64

      - name: Download rootfs (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: rootfs-x86_64
          path: /tmp/artifacts/rootfs-x86_64

      - name: Download rootfs (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: rootfs-aarch64
          path: /tmp/artifacts/rootfs-aarch64

      - name: Prepare release assets
        run: |
          mkdir -p /tmp/release
          # x86_64
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-x86_64-unknown-linux-musl/containerd-shim-cloudhv-v1 \
            /tmp/release/containerd-shim-cloudhv-v1-linux-amd64
          cp /tmp/artifacts/cloudhv-agent-x86_64-unknown-linux-musl/cloudhv-agent \
            /tmp/release/cloudhv-agent-linux-amd64
          cp /tmp/artifacts/vmlinux-x86_64/vmlinux /tmp/release/vmlinux-amd64
          cp /tmp/artifacts/rootfs-x86_64/rootfs.erofs /tmp/release/rootfs-amd64.erofs
          chmod +x /tmp/release/containerd-shim-cloudhv-v1-linux-amd64
          chmod +x /tmp/release/cloudhv-agent-linux-amd64
          # aarch64
          cp /tmp/artifacts/containerd-shim-cloudhv-v1-aarch64-unknown-linux-musl/containerd-shim-cloudhv-v1 \
            /tmp/release/containerd-shim-cloudhv-v1-linux-arm64
          cp /tmp/artifacts/cloudhv-agent-aarch64-unknown-linux-musl/cloudhv-agent \
            /tmp/release/cloudhv-agent-linux-arm64
          cp /tmp/artifacts/vmlinux-aarch64/vmlinux /tmp/release/vmlinux-arm64
          cp /tmp/artifacts/rootfs-aarch64/rootfs.erofs /tmp/release/rootfs-arm64.erofs
          chmod +x /tmp/release/containerd-shim-cloudhv-v1-linux-arm64
          chmod +x /tmp/release/cloudhv-agent-linux-arm64
          # Generate checksums
          cd /tmp/release && sha256sum * > checksums-sha256.txt

      - name: Package and push Helm chart to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" charts/cloudhv-installer/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/cloudhv-installer/Chart.yaml

          # Package the chart
          helm package charts/cloudhv-installer --destination /tmp/release

          # Push to GHCR as an OCI artifact
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          helm push /tmp/release/cloudhv-installer-$VERSION.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Generate release notes
        id: notes
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            RANGE="$PREV_TAG..HEAD"
            echo "First release — showing all changes." > /tmp/release-notes.md
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            echo "## Changes since ${PREV_TAG}" > /tmp/release-notes.md
          fi
          echo "" >> /tmp/release-notes.md

          # Group commits by type
          for prefix in "feat" "fix" "perf" "docs" "chore" "test" "build"; do
            COMMITS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^${prefix}" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              case $prefix in
                feat)  LABEL="Features" ;;
                fix)   LABEL="Bug Fixes" ;;
                perf)  LABEL="Performance" ;;
                docs)  LABEL="Documentation" ;;
                chore) LABEL="Maintenance" ;;
                test)  LABEL="Tests" ;;
                build) LABEL="Build" ;;
              esac
              echo "### ${LABEL}" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
              echo "$COMMITS" >> /tmp/release-notes.md
              echo "" >> /tmp/release-notes.md
            fi
          done

          # Installation section
          cat >> /tmp/release-notes.md << 'INSTALL'
          ## Installation

          ### Binaries (bare Linux)

          Download the binaries from this release and install manually:

          ```bash
          sudo install -m 755 containerd-shim-cloudhv-v1-linux-amd64 /usr/local/bin/containerd-shim-cloudhv-v1
          sudo mkdir -p /opt/cloudhv
          sudo cp vmlinux rootfs.erofs /opt/cloudhv/
          ```

          ### Helm Chart (Kubernetes)

          The chart is published to GHCR as an OCI artifact:

          ```bash
          helm install cloudhv-installer \
            oci://ghcr.io/devigned/charts/cloudhv-installer \
            --version TAG \
            --namespace kube-system
          ```

          ### Installer Image

          ```
          ghcr.io/devigned/cloudhv-installer:TAG
          ```
          INSTALL

          # Replace TAG placeholder
          sed -i "s/TAG/${GITHUB_REF_NAME}/" /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: /tmp/release/*
          generate_release_notes: false
