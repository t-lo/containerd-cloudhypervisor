name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CH_VERSION: "v51.1"
  KERNEL_SERIES: "6.18"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cd crates/agent && cargo fmt -- --check

      - name: Clippy
        run: |
          cargo clippy --workspace --lib -- -D warnings
          cd crates/agent && cargo clippy --all-targets -- -D warnings

      - name: Test installer
        run: bash installer/test-install.sh

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run unit tests
        run: |
          cargo test --workspace --lib --bins
          cd crates/agent && cargo test

      - name: Check benchmarks compile
        run: cargo bench -p containerd-shim-cloudhv --bench vm_overhead --no-run

  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            alt_arch: x86-64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            alt_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest kernel release version (for cache key)
        id: kernel-version
        run: |
          source hacks/util.inc
          echo "kernel_version=$(latest_kernel_release "$KERNEL_SERIES")" | tee -a "$GITHUB_OUTPUT"

      - name: Cache guest kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: |
            ./vmlinux
            ./vmlinux.kconfig
          key: kernel-${{ matrix.arch }}-${{ steps.kernel-version.outputs.kernel_version }}-${{ hashFiles('guest/kernel/configs/microvm-${{ matrix.arch }}.config', 'guest/kernel/configs/microvm.config' ,'guest/kernel/build-kernel.sh') }}

      - name: Build complete Guest (kernel, agent, and root FS)
        run: |
          bash hacks/build-guest.sh

      - name: Build Containerd shim and daemon
        run: |
          bash hacks/build-static-rust.sh containerd-shim-cloudhv cloudhv-sandbox-daemon
          ls -slh containerd-shim-cloudhv-v1 cloudhv-sandbox-daemon

      - name: Build host dependencies for sysext
        run: |
          bash hacks/build-host-deps.sh

      - name: Build the system extension image
        run: |
          bash hacks/build-sysext.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            rootfs.erofs
            vmlinux
            vmlinux.kconfig
            containerd-shim-cloudhv-v1
            containerd-cloudhypervisor.raw

  integration-test:
    name: Integration Tests for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: [build]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install sysext test dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-system python3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: integration
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler musl-tools \
            flex bison libelf-dev bc \
            iproute2 util-linux curl erofs-utils

      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "KVM_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "KVM available"
          else
            echo "KVM_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "KVM not available - integration tests will be skipped"
          fi

      - name: Install Cloud Hypervisor
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # Build CH from source (need main branch for OnDemand restore)
          sudo apt-get install -y libssl-dev
          git clone --depth 1 https://github.com/cloud-hypervisor/cloud-hypervisor.git /tmp/ch-build
          cd /tmp/ch-build
          cargo build --release --bin cloud-hypervisor
          sudo install -m 755 target/release/cloud-hypervisor /usr/local/bin/cloud-hypervisor
          cloud-hypervisor --version

      - name: Download build artifacts
        if: env.KVM_AVAILABLE == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64

      - name: Run integration tests
        if: env.KVM_AVAILABLE == 'true'
        timeout-minutes: 10
        run: |
          # Build daemon
          cargo build --release -p cloudhv-sandbox-daemon

          # Write daemon config
          sudo mkdir -p /opt/cloudhv /run/cloudhv/daemon
          sudo tee /opt/cloudhv/daemon-test.json > /dev/null <<EOF
          {
            "pool_size": 3,
            "kernel_path": "$PWD/vmlinux",
            "rootfs_path": "$PWD/rootfs.erofs",
            "kernel_args": "console=ttyS0 root=/dev/vda rw init=/init net.ifnames=0",
            "default_vcpus": 1,
            "default_memory_mb": 128,
            "socket_path": "/run/cloudhv/daemon.sock",
            "state_dir": "/run/cloudhv/daemon",
            "warmup_duration_secs": 5
          }
          EOF

          # Start daemon in background
          sudo RUST_LOG=info ./target/release/cloudhv-sandbox-daemon \
            /opt/cloudhv/daemon-test.json &
          DAEMON_PID=$!
          echo "Daemon started (PID=$DAEMON_PID)"

          # Wait for daemon to be ready
          for i in $(seq 1 30); do
            if [ -S /run/cloudhv/daemon.sock ]; then
              echo "Daemon socket ready"
              break
            fi
            sleep 1
          done

          # Run daemon integration tests
          sudo -E env "PATH=$PATH" \
            DAEMON_SOCKET="/run/cloudhv/daemon.sock" \
            WARMUP_SECS=5 \
            cargo test -p cloudhv-sandbox-daemon --test integration -- --nocapture --test-threads=1

          # Stop daemon
          sudo kill $DAEMON_PID 2>/dev/null || true
          wait $DAEMON_PID 2>/dev/null || true

      - name: Run sysext / Flatcar VM integration tests
        if: env.KVM_AVAILABLE == 'true'
        run: |
          set -e
          hacks/test-sysext.sh

      - name: Fix cargo cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ~/.cargo/ target/ 2>/dev/null || true

      - name: Skip notice
        if: env.KVM_AVAILABLE != 'true'
        run: echo "::warning::Integration tests skipped because KVM is not available on this runner"
