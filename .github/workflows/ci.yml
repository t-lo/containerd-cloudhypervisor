name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CH_VERSION: "v44.0"
  KERNEL_SERIES: "6.18"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cd crates/agent && cargo fmt -- --check

      - name: Clippy
        run: |
          cargo clippy --workspace --lib -- -D warnings
          cd crates/agent && cargo clippy --all-targets -- -D warnings

      - name: Test installer
        run: bash installer/test-install.sh

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run unit tests
        run: |
          cargo test --workspace
          cd crates/agent && cargo test

      - name: Check benchmarks compile
        run: cargo bench -p containerd-shim-cloudhv --bench vm_overhead --no-run

  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            alt_arch: x86-64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            alt_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest kernel release version (for cache key)
        id: kernel-version
        run: |
          source hacks/util.inc
          echo "kernel_version=$(latest_kernel_release "$KERNEL_SERIES")" | tee -a "$GITHUB_OUTPUT"

      - name: Cache guest kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: |
            ./vmlinux
            ./vmlinux.kconfig
          key: kernel-${{ matrix.arch }}-${{ steps.kernel-version.outputs.kernel_version }}-${{ hashFiles('guest/kernel/configs/microvm-${{ matrix.arch }}.config', 'guest/kernel/configs/microvm.config' ,'guest/kernel/build-kernel.sh') }}

      - name: Build complete Guest (kernel, agent, and root FS)
        run: |
          bash hacks/build-guest.sh

      - name: Build Containerd shim
        run: |
          bash hacks/build-static-rust.sh containerd-shim-cloudhv
          ls -slh containerd-shim-cloudhv-v1

      - name: Build host dependencies for sysext
        run: |
          bash hacks/build-host-deps.sh

      - name: Build the system extension image
        run: |
          bash hacks/build-sysext.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            rootfs.erofs
            vmlinux
            vmlinux.kconfig
            containerd-shim-cloudhv-v1
            containerd-cloudhypervisor.raw

  integration-test:
    name: Integration Tests for ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: [build]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: integration
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler musl-tools \
            flex bison libelf-dev bc \
            iproute2 util-linux curl

      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "KVM_AVAILABLE=true" >> "$GITHUB_ENV"
            echo "KVM available"
          else
            echo "KVM_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "KVM not available - integration tests will be skipped"
          fi

      - name: Install Cloud Hypervisor
        if: env.KVM_AVAILABLE == 'true'
        run: |
          sufx=""
          if [ "${{ matrix.target }}" = "aarch64" ] ; then
            sufx="-aarch64"
          fi
          wget -q "https://github.com/cloud-hypervisor/cloud-hypervisor/releases/download/${{ env.CH_VERSION }}/cloud-hypervisor-static${sufx}" \
            -O /tmp/cloud-hypervisor
          sudo install -m 755 /tmp/cloud-hypervisor /usr/local/bin/cloud-hypervisor
          cloud-hypervisor --version

      - name: Install http-echo (for container integration tests)
        if: env.KVM_AVAILABLE == 'true'
        run: |
          # http-echo is a static Go binary; extract from the Docker image
          docker pull hashicorp/http-echo:latest
          CID=$(docker create hashicorp/http-echo:latest)
          docker cp "$CID:/http-echo" /tmp/http-echo
          docker rm "$CID"
          sudo install -m 755 /tmp/http-echo /usr/local/bin/http-echo
          echo "http-echo installed: $(file /usr/local/bin/http-echo)"

      - name: Download build artifacts
        if: env.KVM_AVAILABLE == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64

      - name: Run integration tests
        if: env.KVM_AVAILABLE == 'true'
        timeout-minutes: 10
        run: |
          sudo -E env "PATH=$PATH" \
            CLOUDHV_TEST_KERNEL="$PWD/vmlinux" \
            CLOUDHV_TEST_ROOTFS="$PWD/rootfs.erofs" \
            CLOUDHV_TEST_CH_BIN="/usr/local/bin/cloud-hypervisor" \
            CLOUDHV_TEST_HTTP_ECHO="/usr/local/bin/http-echo" \
            cargo test -p containerd-shim-cloudhv --test integration -- --nocapture --test-threads=1

      - name: Fix cargo cache permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ~/.cargo/ target/ 2>/dev/null || true

      - name: Skip notice
        if: env.KVM_AVAILABLE != 'true'
        run: echo "::warning::Integration tests skipped because KVM is not available on this runner"
