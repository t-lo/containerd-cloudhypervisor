# cloudhv-agent configuration
# This file is optional. The agent uses built-in defaults if not present.
#
# Place at /etc/cloudhv-agent.conf inside the guest rootfs.

# vsock port to listen on (default: 10789)
# vsock_port = 10789

# Log level: error, warn, info, debug, trace
# log_level = "info"

# Container root directory
# container_root = "/containers"
